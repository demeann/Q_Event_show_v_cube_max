# Alembic configuration.
# DSN берётся из app.core.config.Settings — здесь только пути и логирование.

[alembic]
script_location = app/db/migrations
prepend_sys_path = .
version_path_separator = os
timezone = UTC

# DSN заполняется в env.py из настроек, здесь оставляем плейсхолдер.
sqlalchemy.url = driver://user:pass@host/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
